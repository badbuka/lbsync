version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
    - copyloopvar
    - nilerr
    - prealloc
    - whitespace
    - gocyclo
  settings:
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G104
    revive:
      severity: warning
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
          arguments:
            - disableStutteringCheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - gocyclo
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/badbuka/lbsync

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
